<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Room Management System</title>
    <link rel="stylesheet" href="homestyle.css"/>
    <link rel="stylesheet" href="dashboardoverride.css"/>
    <link rel="icon" href="CIT LOGO.png" type="image/x-icon">
</head>
<body>
    <nav> 
        <div class="university-container">
            <img src="CIT LOGO.png" width="65px" alt="Logo"/>
            <div class="university-titles">
                <h2 class="university-title">Bulacan State University</h2>
                <h3 class="university-titlebelow">College of Industrial Technology</h3>
            </div>
        </div>

        <div class="menu-toggle" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <div class="links-container" id="navLinks">
            <a class="link" href="home.html"> Home </a>
            <a class="link" href="about.html"> About </a>
            <a class="btn-link" href="index.html"> Logout </a>
        </div>
    </nav>

    <div class="main-container">
        <img class="main-bg-image" src="CIT Building.jpg" alt="CIT Building"/>
        <div class="overlay"></div>

        <div class="cards">
            <div class="card">
                <h3 class="card-title">Vacant Room</h3>
                <div id="vacant-list">
                    </div>
            </div>

            <div class="card">
                <h3 class="card-title">Occupied Room</h3>
                <div id="occupied-list">
                    </div>
            </div>

            <div class="card">
                <h3 class="card-title">Room Information</h3>
                <span id="roomStatus" class="status vacant"> VACANT </span>
                <div class="info">
                    <p><strong>Instructor:</strong> <span id="instName">---</span></p>
                    <p><strong>Schedule:</strong> <span id="roomSched">---</span></p>
                </div>
                
                <div id="timer-section" style="display:none; margin-top:20px; border-top:1px solid #ddd; padding-top:10px;">
                    <p><strong>Time Elapsed:</strong></p>
                    <h2 id="timer-display">00:00</h2>
                    <p id="overtime-msg" style="color: crimson; font-weight: bold; display: none;"> OVERTIME ALERT</p>
                </div>
            </div>
        </div>
    </div>

    <script src="homescript.js"></script>
</body>
</html>
